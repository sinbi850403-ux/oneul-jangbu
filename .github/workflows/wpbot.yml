name: WPBot - WordPress 자동 블로그 포스팅

on:
  schedule:
    - cron: '30 1 * * *'   # 매일 오전 10시 30분 KST (UTC 01:30)
    - cron: '30 6 * * *'   # 매일 오후 3시 30분 KST (UTC 06:30)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 패키지 설치
        working-directory: wpbot
        run: npm install

      - name: WordPress 포스팅
        working-directory: wpbot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_ACCESS_TOKEN: ${{ secrets.WP_ACCESS_TOKEN }}
          WP_SITE_ID: ${{ secrets.WP_SITE_ID }}
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
        run: node index.js
